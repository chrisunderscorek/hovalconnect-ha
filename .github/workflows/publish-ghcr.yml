name: Publish GHCR app image

on:
  push:
    branches:
      - main
    paths:
      - .github/workflows/publish-ghcr.yml
      - custom_components/hovalconnect/**
      - hovalconnect/**
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  IMAGE: ghcr.io/chrisunderscorek/hovalconnect-ha
  VERSION: 0.0.2

jobs:
  build:
    name: Build ${{ matrix.hass_arch }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/amd64
            hass_arch: amd64
          - platform: linux/arm64
            hass_arch: aarch64
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: hovalconnect/Dockerfile
          platforms: ${{ matrix.platform }}
          push: true
          provenance: false
          sbom: false
          build-args: |
            BUILD_VERSION=${{ env.VERSION }}
            BUILD_ARCH=${{ matrix.hass_arch }}
          tags: |
            ${{ env.IMAGE }}:${{ env.VERSION }}-${{ matrix.hass_arch }}

  manifest:
    name: Publish multi-arch tags
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create manifests
        run: |
          docker buildx imagetools create \
            -t "${IMAGE}:${VERSION}" \
            -t "${IMAGE}:latest" \
            "${IMAGE}:${VERSION}-amd64" \
            "${IMAGE}:${VERSION}-aarch64"
